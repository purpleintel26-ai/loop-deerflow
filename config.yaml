# LOOP-DeerFlow Production Configuration
config_version: 3

log_level: info

token_usage:
  enabled: true

# Models - Using OpenRouter for access to multiple LLMs
models:
  - name: claude-sonnet
    display_name: Claude 3.5 Sonnet
    use: langchain_openai:ChatOpenAI
    model: anthropic/claude-3.5-sonnet
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 4096
    temperature: 0.7
    supports_vision: true

  - name: gpt-4o
    display_name: GPT-4o
    use: langchain_openai:ChatOpenAI
    model: openai/gpt-4o
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 4096
    temperature: 0.7
    supports_vision: true

# Tool Groups
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash
  - name: skills

# Tools
tools:
  - name: web_search
    group: web
    use: deerflow.community.tavily.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool
    timeout: 60

  - name: skill_read
    group: skills
    use: deerflow.tools.skill_read_tool

  - name: skill_search
    group: skills
    use: deerflow.tools.skill_search_tool

# Agent Configuration
agent:
  default_model: claude-sonnet
  max_iterations: 30
  max_tokens_per_iteration: 4000

# Gateway Configuration
gateway:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"

# Sandbox Configuration
sandbox:
  type: e2b
  api_key: $E2B_API_KEY
  timeout: 300

# Memory Configuration
memory:
  type: postgres
  url: $DATABASE_URL

# Extensions
extensions:
  enabled: true
  config_path: /app/extensions_config.json
